<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câu 5 - Hoàn thiện Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER & NAV --- */
        header {
            background-color: #2f63ff; 
            color: white;
            display: flex;
            padding: 15px;
            justify-content: center;
            align-items: center;
        }

        .logo svg {
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }

        .title-box {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        h1 { font-size: 26px; margin: 0; }
        .slogan { font-size: 16px; font-style: italic; margin-left: 2px; }

        .nav-container {
            display: flex;
            background-color: #2fcbff;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }

        .nav-item { padding: 14px 20px; cursor: pointer; }
        .nav-item a { text-decoration: none; color: black; }
        .nav-item:hover { background-color: #ffe700; }

        /* --- QUẢNG CÁO (Câu 2) --- */
        .advert {
            width: 100%;
            height: 200px;
            border: 2px solid red;
            background-color: #00e56b;
            margin-top: 20px;
            text-align: center;
            line-height: 200px;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .advert:hover {
            background-color: #ffe700;
            border-color: #00b253;
            font-style: italic;
        }

        /* --- DANH SÁCH KHÓA HỌC (Flexbox + Tái sử dụng .item) --- */
        .section-title {
            text-align: center;
            margin: 30px 0 20px 0;
            color: #333;
        }

        .course-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; /* Bắt buộc để xuống hàng */
            padding: 0 20px;
            margin-bottom: 30px;
        }

        /* CSS item từ câu 2, chỉnh auto chiều cao để nhét vừa ảnh */
        .item {
            background-color: #ffe700;
            width: 300px;
            height: auto; 
            border: 1px solid black;
            padding: 15px;
            border-radius: 5px;
        }

        .item img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }

        .item h3 { color: #2f63ff; margin-bottom: 8px; font-size: 18px; }
        .item p { font-size: 14px; margin-bottom: 4px; }

        /* --- FORM ĐĂNG KÝ (Câu 4) --- */
        .form-wrapper {
            margin: 20px auto 40px auto;
            background-color: white;
            padding: 25px;
            border: 2px solid black;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
        }

        .form-wrapper h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #218838; }

        /* --- FOOTER --- */
        footer {
            background-color: #2f63ff;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: auto; 
            border-top: 3px solid #ffe700;
        }

        /* --- RESPONSIVE --- */
        @media screen and (max-width: 414px) {
            .form-wrapper { max-width: 95%; }
            .item { width: 100%; }
        }
        @media screen and (min-width: 415px) and (max-width: 1024px) {
            .form-wrapper { max-width: 700px; }
            .item { width: 45%; }
        }
        @media screen and (min-width: 1025px) {
            .form-wrapper { max-width: 500px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="40" stroke="white" stroke-width="3" fill="none"></circle>
                <text x="50%" y="60%" text-anchor="middle" font-size="24px" font-weight="bold" fill="white">EL</text>
            </svg>
        </div>
        <div class="title-box">
            <h1>English Learning</h1>
            <p class="slogan">Kiến tạo tương lai</p>
        </div> 
    </header>

    <div class="nav-container">
        <div class="nav-item"><a href="#">Trang chủ</a></div>
        <div class="nav-item"><a href="#">Khóa học</a></div>
        <div class="nav-item"><a href="#">Layout</a></div>
        <div class="nav-item"><a href="#">Đăng ký</a></div>
    </div>

    <div class="advert">Khuyến mãi 50% khi đăng ký hôm nay!</div>

    <h2 class="section-title">Danh Sách Khóa Học (6 Lớp)</h2>
    <div id="course-list" class="course-container"></div>

    <div class="form-wrapper">
        <h2>ĐĂNG KÝ KHÓA HỌC</h2>
        <form id="courseForm">
            <div class="form-group">
                <label>Họ và tên:</label>
                <input type="text" id="fullname" placeholder="Nhập họ tên...">
            </div>
            <div class="form-group">
                <label>Địa chỉ email:</label>
                <input type="email" id="email" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>Số điện thoại:</label>
                <input type="tel" id="phone" placeholder="Nhập số điện thoại...">
            </div>
            <div class="form-group">
                <label>Khóa học muốn đăng ký:</label>
                <select id="course">
                    <option value="">-- Chọn khóa học --</option>
                    <option value="web"> Lập trình Web </option>
                    <option value="network"> Quản trị mạng </option>
                    <option value="data"> Khoa học dữ liệu </option>
                </select>
            </div>
            <div class="form-group">
                <label>Thời gian ưu tiên học:</label>
                <input type="text" id="time" placeholder="Ví dụ: Sáng thứ 2, 4, 6">
            </div>
            <button type="submit"> Gửi đăng ký </button>
        </form>
    </div>

    <footer>
        <p><strong>Sinh viên thực hiện:</strong> Lê Phan Anh</p>
        <p>© 2026 - Đề thi thiết kế Website</p>
    </footer>

    <script>
        // 1. CHUỖI JSON 6 ĐỐI TƯỢNG VÀ CÓ ẢNH
        var jsonData = `[
            {
                "tenKhoaHoc": "Tiếng Anh Giao Tiếp",
                "moTa": "Khóa học giao tiếp cơ bản",
                "hocPhi": "2.000.000 VNĐ",
                "thoiGianKhaiGiang": "01/06/2026",
                "anh": "https://picsum.photos/id/11/300/150"
            },
            {
                "tenKhoaHoc": "IELTS Foundation",
                "moTa": "Luyện kỹ năng nền tảng",
                "hocPhi": "3.500.000 VNĐ",
                "thoiGianKhaiGiang": "10/06/2026",
                "anh": "https://picsum.photos/id/12/300/150"
            },
            {
                "tenKhoaHoc": "TOEIC 4 Kỹ Năng",
                "moTa": "Phát triển đầy đủ 4 kỹ năng",
                "hocPhi": "4.000.000 VNĐ",
                "thoiGianKhaiGiang": "15/06/2026",
                "anh": "https://picsum.photos/id/13/300/150"
            },
            {
                "tenKhoaHoc": "Tiếng Anh Cho DN",
                "moTa": "Tiếng Anh giao tiếp công sở",
                "hocPhi": "2.800.000 VNĐ",
                "thoiGianKhaiGiang": "20/06/2026",
                "anh": "https://picsum.photos/id/14/300/150"
            },
            {
                "tenKhoaHoc": "Phát Âm & Phản Xạ",
                "moTa": "Luyện nghe nói chuẩn tự nhiên",
                "hocPhi": "1.800.000 VNĐ",
                "thoiGianKhaiGiang": "02/07/2026",
                "anh": "https://picsum.photos/id/15/300/150"
            },
            {
                "tenKhoaHoc": "Luyện Viết Academic",
                "moTa": "Tập trung tư duy viết luận",
                "hocPhi": "3.200.000 VNĐ",
                "thoiGianKhaiGiang": "08/07/2026",
                "anh": "https://picsum.photos/id/16/300/150"
            }
        ]`;

        var courses = JSON.parse(jsonData);
        var courseList = document.getElementById("course-list");
        
        // 2. HIỂN THỊ BẰNG VÒNG LẶP WHILE
        var i = 0;
        while (i < courses.length) {
            courseList.innerHTML += `
                <div class="item">
                    <img src="${courses[i].anh}" alt="${courses[i].tenKhoaHoc}">
                    <h3>${courses[i].tenKhoaHoc}</h3>
                    <p><strong>Mô tả:</strong> ${courses[i].moTa}</p>
                    <p><strong>Học phí:</strong> ${courses[i].hocPhi}</p>
                    <p><strong>Khai giảng:</strong> ${courses[i].thoiGianKhaiGiang}</p>
                </div>
            `;
            i++;
        }

        // 3. VALIDATE FORM
        document.getElementById("courseForm").addEventListener("submit", function(e){
            e.preventDefault();

            var fullname = document.getElementById("fullname").value.trim();
            var email = document.getElementById("email").value.trim();
            var phone = document.getElementById("phone").value.trim();
            var course = document.getElementById("course").value;
            var time = document.getElementById("time").value.trim();

            if(fullname === "" || email === "" || phone === "" || course === "" || time === "") {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailPattern.test(email)) {
                alert("Email không hợp lệ!");
                return;
            }

            var phonePattern = /^[0-9]{10}$/;
            if(!phonePattern.test(phone)) {
                alert("Số điện thoại phải gồm 10 số!");
                return;
            }

            alert("Đăng ký khóa học thành công!");
        });
    </script>
</body>
</html>
