<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câu 2 - Layout</title>
    <style>
        /* Màu nền vàng #ffe700 */
        .item {
            background-color: #ffe700;
            width: 300px;
            height: 150px;
            border: 1px solid black;
            margin: 15px;
            display: inline-block; /* Giúp dễ nhìn hơn khi có 6 thẻ */
        }

        /* Màu nền xanh lá #00e56b */
        .advert {
            width: 100%;
            height: 200px;
            border: 2px solid red;
            background-color: #00e56b;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>

    <div class="advert"></div>
    
</body>
</html>
